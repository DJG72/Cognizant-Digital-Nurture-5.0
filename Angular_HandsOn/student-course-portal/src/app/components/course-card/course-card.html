<div 
  class="course-card" 
  appHighlight="lightblue" 
  [ngClass]="cardClasses" 
  [ngStyle]="{'border-left':'8px solid ' + getBorderColor()}"
>
  <h3>{{ course.name }}</h3>
  
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>
  <p><strong>ID:</strong> {{ course.id }}</p>
  
  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="failed">Failed</span>
    <span *ngSwitchDefault class="pending">Pending</span>
  </div>
  
  <br>
  
  <button (click)="enroll()">Enroll</button>
  <button (click)="toggleDetails()">Show Details</button>
</div>
