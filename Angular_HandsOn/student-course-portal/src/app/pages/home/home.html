<h1>{{ portalName }}</h1>

<p>
  Manage your courses, monitor your academic progress,
  enroll in new courses and track your performance.
</p>

<hr>

<!-- Property Binding -->
<button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">

    Enroll Now

</button>

<br><br>

<p>{{ message }}</p>

<hr>

<!-- Two-Way Binding -->

<label>Search Courses:</label>

<br><br>

<input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Enter course name">

<p>
    Searching for:
    {{ searchTerm }}
</p>

<hr>

<div class="stats">

    <div class="card">
        <h3>Courses Available</h3>
        <p>12</p>
    </div>

    <div class="card">
        <h3>Enrolled</h3>
        <p>3</p>
    </div>

    <div class="card">
        <h3>GPA</h3>
        <p>3.8</p>
    </div>

</div>
