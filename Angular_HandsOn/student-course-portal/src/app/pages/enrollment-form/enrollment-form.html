<h2>Student Enrollment Request</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
  <!-- Name Field -->
  <label>Student Name</label>
  <input 
    type="text" 
    name="studentName" 
    [(ngModel)]="studentName" 
    required 
    minlength="3" 
    #nameCtrl="ngModel"
  >
  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
    Name is required
  </span>
  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
    Name must be at least 3 characters
  </span>
  <br><br>

  <!-- Email Field -->
  <label>Student Email</label>
  <input 
    type="email" 
    name="studentEmail" 
    [(ngModel)]="studentEmail" 
    required 
    email 
    #emailCtrl="ngModel"
  >
  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
    Email is required
  </span>
  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
    Invalid Email Address
  </span>
  <br><br>

  <!-- Course ID Field -->
  <label>Course ID</label>
  <input 
    type="number" 
    name="courseId" 
    [(ngModel)]="courseId" 
    required 
    #courseCtrl="ngModel"
  >
  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
    Course ID is required
  </span>
  <br><br>

  <!-- Terms & Conditions Field -->
  <label>
    <input 
      type="checkbox" 
      name="agreeToTerms" 
      [(ngModel)]="agreeToTerms" 
      required 
      #termsCtrl="ngModel"
    > 
    I agree to Terms & Conditions
  </label>
  <span *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
    Please accept the terms.
  </span>
  <br><br>

  <!-- Semester Dropdown -->
  <label>Preferred Semester</label>
  <select name="preferredSemester" [(ngModel)]="preferredSemester">
    <option value="">Select</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>
  <br><br>

  <!-- Actions -->
  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  <button type="button" (click)="enrollForm.resetForm()">Reset</button>
</form>

<!-- Success Message -->
<div *ngIf="submitted" class="success">
  Enrollment request submitted successfully!
</div>
