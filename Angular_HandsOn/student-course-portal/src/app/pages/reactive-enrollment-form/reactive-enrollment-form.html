<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
  <!-- Student Name -->
  <label>Student Name</label>
  <input type="text" formControlName="studentName">
  <br><br>

  <!-- Email -->
  <label>Email</label>
  <input type="email" formControlName="studentEmail">
  <br><br>
  <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']"> Email already exists. </span>

  <!-- Course ID -->
  <label>Course ID</label>
  <input type="number" formControlName="courseId">
  <br><br>
  <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"> Course code starting with XX is not allowed. </span>

  <!-- Preferred Semester -->
  <label>Preferred Semester</label>
  <select formControlName="preferredSemester">
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>
  <br><br>

  <!-- Terms and Conditions -->
  <label>
    <input type="checkbox" formControlName="agreeToTerms"> 
    I Agree to Terms
  </label>
  <br><br>
  
  <hr>

<h3>Additional Courses</h3>

<div formArrayName="additionalCourses">
  <div *ngFor="let ctrl of additionalCourses.controls; let i = index">
    <input [formControl]="ctrl">

    <button
      type="button"
      (click)="removeCourse(i)">
      Remove
    </button>
  </div>
</div>

<br>

<button
  type="button"
  (click)="addCourse()">
  Add Another Course
</button>

<br><br>
  <!-- Form Actions -->
  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
</form>
